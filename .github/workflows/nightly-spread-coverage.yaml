name: Nightly spread coverage

on:
  pull_request:
    branches: [ "master" ]

jobs:
  snap-builds:
    runs-on: ${{ fromJSON(matrix.runs-on) }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Patch builds
      run: |
        sudo snap install go --classic 
        go run ./tests/utils/features/instrument-funcs

    - name: Commit changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "bot@githubactions.com"
        git add .
        git commit -m "Patch builds for coverage"
    
    - name: Build and upload snap
      uses: ./.github/actions/build-snapd-checks
      with:
        toolchain: ${{ matrix.toolchain }}
        variant: test
        runs-on: ${{ matrix.runs-on }}
        pr-number: ${{ github.event.pull_request.number || '' }}
    strategy:
      matrix:
        runs-on:
          - '["ubuntu-22.04"]'
          - ${{ github.event.repository.private && '["self-hosted", "Linux", "jammy", "ARM64", "large"]' || '["ubuntu-22.04-arm"]' }}
        toolchain:
          - default
          - FIPS
        exclude:
          - runs-on: ${{ github.event.repository.private && '["self-hosted", "Linux", "jammy", "ARM64", "large"]' || '["ubuntu-22.04-arm"]' }}
            toolchain: FIPS

  read-systems:
    runs-on: ubuntu-latest
    outputs:
      systems: ${{ steps.read-systems.outputs.systems }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read matrix file
        id: read-systems
        shell: bash
        run: |
          echo "systems=$(jq -cs '{include: (map(.include // []) | add)}' \
            ./.github/workflows/data-fundamental-systems.json \
            ./.github/workflows/data-non-fundamental-systems.json \
            ./.github/workflows/data-nested-systems.json)" >> $GITHUB_OUTPUT

  spread-coverage:
    uses: ./.github/workflows/spread-tests.yaml
    name: "spread master ${{ matrix.group }}"
    needs: [read-systems, snap-builds]
    secrets: inherit
    with:
      runs-on: '${{ matrix.runs-on }}'
      group: ${{ matrix.group }}
      backend: ${{ matrix.backend }}
      alternative-backend: ${{ matrix.alternative-backend }}
      systems: ${{ matrix.systems }}
      tasks: ${{ matrix.tasks }}
      # tasks: tests/main/alias
      rules: ${{ matrix.rules }}
      upload-artifacts: true
      spread-env: "SPREAD_TAG_FEATURES=true"
      skip-tests: 'ubuntu-14.04-64 tests/lib/ tests/unit/ tests/utils/cross-build manual/snapd-refresh-from-old core/persistent-journal'
      log-to-grafana: false
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.read-systems.outputs.systems) }}

  get-all-features:
    runs-on: ubuntu-latest
    needs: snap-builds
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download snapd snap
        uses: ./.github/actions/download-snapd-snap
        with:
          use-master-push: false
          is-amd64: true
          is-arm64: false
          is-fips: false

      - name: Get all snapd features
        run: |
          sudo snap install built-snap/snapd_*.snap.keep --dangerous
          snap debug features > all-features.json

      - name: Upload snapd feature data
        uses: actions/upload-artifact@v7
        with:
          name: "all-features"
          path: "all-features.json"

  create-reports:
    needs: [spread-coverage, get-all-features]
    runs-on: ["self-hosted", "spread-enabled"]
    if: |
      always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get generated data
        uses: actions/download-artifact@v8
        with:
          path: feature-tags-artifacts
          pattern: spread-artifacts-*
          merge-multiple: true

      - name: Get all features
        uses: actions/download-artifact@v8
        with:
          name: all-features

      - name: Create feature tags
        run: |
          WORK_DIR=. ./tests/utils/features/process-features.sh

          tar -czf "final-feature-tags.tar.gz" "final-feature-tags"

      - name: Upload results to mongo
        env: 
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASS }}
          MONGO_HOST: ${{ secrets.MONGO_HOST }}
          MONGO_PORT: ${{ secrets.MONGO_PORT }}
        run: ./tests/utils/features/mongo_upload.py --dir "final-feature-tags" --verbose
      
      - name: Upload feature data
        uses: actions/upload-artifact@v7
        with:
          name: "feature-tags"
          path: "final-feature-tags.tar.gz"
