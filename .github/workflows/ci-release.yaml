name: Release Testing
on:
  pull_request:
    branches: [ "release/**" ]

jobs:
  run-gate:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'Skip spread') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running release testing."

  snap-builds:
    uses: ./.github/workflows/snap-builds.yaml
    needs: run-gate
    with:
      runs-on: '["ubuntu-latest"]'
      toolchain: default
      variant: test

  find-lowest-supported:
    runs-on: ubuntu-latest
    needs: run-gate
    outputs:
      system: ${{ steps.find-lowest-supported.outputs.system }}
    steps:
      - name: Find lowest supported Ubuntu version
        id: find-lowest-supported
        run: |
          sudo apt update
          version=$(ubuntu-distro-info --supported --release | head -1 | awk '{print $1}')
          echo "Setting lowest supported system to ubuntu-$version-64"
          echo "system=ubuntu-$version-64" >> $GITHUB_OUTPUT

  test-snapd-deb:
    needs: [snap-builds, find-lowest-supported]
    uses: ./.github/workflows/spread-tests.yaml
    with:
      runs-on: '["ubuntu-latest"]'
      group: deb-test
      backend: garden
      systems: ${{ needs.find-lowest-supported.outputs.system }}
      tasks: 'tests/release/distro-upgrade'
      rules: ''
      spread-env: "SPREAD_SNAPD_DEB_FROM_REPO=false SPREAD_SNAP_REEXEC=0"
      upload-artifacts: true

  test-snapd-snap:
    needs: [snap-builds, find-lowest-supported]
    uses: ./.github/workflows/spread-tests.yaml
    with:
      runs-on: '["ubuntu-latest"]'
      group: snap-test
      backend: garden
      systems: ${{ needs.find-lowest-supported.outputs.system }}
      tasks: 'tests/release/distro-upgrade'
      rules: ''
      upload-artifacts: true

  report-results:
    needs: [test-snapd-deb, test-snapd-snap]
    runs-on: ubuntu-latest
    steps:
      - name: Download
        uses: actions/github-script@v9
        with:
          script: |
            let page = 1;
            let per_page = 100;
            let allArtifacts = [];
            let response;
            do {
              response = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.payload.workflow_run.id,
                per_page: per_page,
                page: page
              });
              allArtifacts = allArtifacts.concat(response.data.artifacts);
              page++;
            } while (allArtifacts.length < response.data.total_count);

            let matchingArtifacts = allArtifacts.filter((artifact) => {
              return artifact.name.startsWith(`spread-artifacts-`);
            });

            for (let artifact of matchingArtifacts) {
              let download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              let fs = require('fs');
              fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/${artifact.name}.zip`, Buffer.from(download.data));
              console.log(`Downloaded artifact: ${artifact.name}.zip`);
            }

      - name: Unzip artifacts
        run: |
          find . -name "spread-artifacts-*.zip" | while read filename; do 
            dir="${filename%.zip}"
            mkdir "$dir"
            unzip "$filename" -d "$dir"
          done

      - name: Report results
        run: |
          echo "Snap results"
          find spread-artifacts-snap-test* -type f -exec sh -c "echo $1; cat $1" _ {} \;
          echo "Deb results"
          find spread-artifacts-deb-test* -type f -exec sh -c "echo $1; cat $1" _ {} \;

