summary: Ensure that the network-setup-control interface works.

details: |
    The network setup control interface allows to access the different netplan
    configuration files.

systems: [-ubuntu-core-*]

prepare: |
    snap set system experimental.parallel-instances=true
    "$TESTSTOOLS"/snaps-state install-local test-snapd-sh

restore: |
    rm -f /etc/network/test001 /etc/netplan/test001
    rm -f /etc/network/test-foo /etc/netplan/test-foo
    snap remove --purge test-snapd-sh_foo || true
    snap set system experimental.parallel-instances=null

execute: |
    dirs="/etc/netplan /etc/network"

    echo "The interface is disconnected by default"
    snap interfaces -i network-setup-control | MATCH -- '^- +test-snapd-sh:network-setup-control'

    echo "When the interface is connected"
    snap connect test-snapd-sh:network-setup-control

    echo "Then the snap is able to write in the network and netplan directories"
    for dir in $dirs; do
        if [ -d "$dir" ]; then
            test-snapd-sh.with-network-setup-control-plug -c "touch $dir/test001"
        fi
    done

    if [ "$(snap debug confinement)" = partial ] ; then
        exit 0
    fi

    echo "When the plug is disconnected"
    snap disconnect test-snapd-sh:network-setup-control

    echo "Then the snap is not able to access the networking configuration dirs"
    for dir in $dirs; do
        if [ -d "$dir" ]; then
            if test-snapd-sh.with-network-setup-control-plug -c "touch $dir/test002" 2>call.error; then
                echo "Expected permission error calling desktop with disconnected plug"
                exit 1
            fi
            MATCH "Permission denied" < call.error
        fi
    done

    echo "Then the interface can be connected again"
    snap connect test-snapd-sh:network-setup-control

    echo "When a parallel install of the snap is installed"
    "$TESTSTOOLS"/snaps-state install-local-as test-snapd-sh test-snapd-sh_foo
    snap connect test-snapd-sh_foo:network-setup-control

    echo "Then the parallel snap can write to netplan and network directories"
    for dir in $dirs; do
        if [ -d "$dir" ]; then
            test-snapd-sh_foo.with-network-setup-control-plug -c "touch $dir/test-foo"
        fi
    done

    echo "When the original snap is removed"
    snap remove --purge test-snapd-sh

    echo "Then the parallel snap can still write to the directories"
    for dir in $dirs; do
        if [ -d "$dir" ]; then
            test-snapd-sh_foo.with-network-setup-control-plug -c "test -f $dir/test-foo"
        fi
    done
