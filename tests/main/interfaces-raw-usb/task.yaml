summary: Ensure that the raw-usb interface works.

details: |
    The raw-usb interface allows detection and grants access to all connected USB devices.

prepare: |
    snap set system experimental.parallel-instances=true
    "$TESTSTOOLS"/snaps-state install-local test-snapd-sh

restore: |
    snap remove --purge test-snapd-sh_foo || true
    snap set system experimental.parallel-instances=null

execute: |
    echo "The interface is not connected by default"
    snap interfaces -i raw-usb | MATCH -- '^- +test-snapd-sh:raw-usb'

    echo "When the interface is connected"
    snap connect test-snapd-sh:raw-usb

    if ! [ -d /sys/bus/usb/devices/usb1 ]; then
        echo "No usb devices registered"
        exit 0
    fi

    echo "Then the snap is able to check for USB devices"
    test-snapd-sh.with-raw-usb-plug -c "test -d /sys/bus/usb/devices/usb1"

    echo "And the snap has raw access to a connected USB device"
    test-snapd-sh.with-raw-usb-plug -c "dd if=/dev/bus/usb/001/001 of=/dev/null count=10"

    echo "And the snap has read access to ACM USB modems and various USB devices"
    for exp in 'c166:*' 'c167:*' 'b180:*' 'c180:*' 'c188:*' 'c189:*' '+usb:*'; do
        file=$(find /run/udev/data/ -name "$exp" | head -1)
        if [ -n "$file" ]; then 
            test-snapd-sh.with-raw-usb-plug -c "cat \"$file\""
        fi
    done

    if [ "$(snap debug confinement)" = partial ] ; then
        exit 0
    fi

    echo "When the plug is disconnected"
    snap disconnect test-snapd-sh:raw-usb

    echo "Then the snap is not able to check for USB devices"
    if test-snapd-sh.with-raw-usb-plug -c "cat /sys/bus/usb/devices/usb1/serial" 2> call.error; then
        echo "Expected permission error accessing to check for USB devices"
        exit 1
    fi
    MATCH "Permission denied" < call.error

    echo "### Parallel instance testing ###"

    echo "Install the parallel instance"
    "$TESTSTOOLS"/snaps-state install-local-as test-snapd-sh test-snapd-sh_foo

    echo "The raw-usb interface is not connected by default for the parallel instance"
    snap interfaces -i raw-usb | MATCH -- '^- +test-snapd-sh_foo:raw-usb'

    echo "When the interface is connected for the parallel instance"
    snap connect test-snapd-sh_foo:raw-usb

    echo "Then the parallel instance snap is able to check for USB devices"
    test-snapd-sh_foo.with-raw-usb-plug -c "ls /sys/bus/usb/devices/usb1"

    echo "And the parallel instance snap has raw access to a connected USB device"
    test-snapd-sh_foo.with-raw-usb-plug -c "cat /dev/bus/usb/001/001 > /dev/null"

    echo "When the original snap is removed"
    snap remove --purge test-snapd-sh

    echo "Then the parallel instance is still able to check USB devices"

    echo "Then the parallel instance snap is able to check for USB devices"
    test-snapd-sh_foo.with-raw-usb-plug -c "ls /sys/bus/usb/devices/usb1"

    echo "And the parallel instance snap has raw access to a connected USB device"
    test-snapd-sh_foo.with-raw-usb-plug -c "cat /dev/bus/usb/001/001 > /dev/null"

    echo "Disconnecting the parallel instance plug"
    snap disconnect test-snapd-sh_foo:raw-usb
    snap remove --purge test-snapd-sh_foo
